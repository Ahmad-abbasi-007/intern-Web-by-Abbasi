<!DOCTYPE html>
<html>
<head>
    <title>Basics Layout</title>
</head>
<body>

    <!-- Header -->
    <header>
        <table border="1" width="100%">
            <tr>
                <td align="center" height="80">Header</td>
            </tr>
        </table>
    </header>

    <!-- Navigation -->
    <nav>
        <table border="1" width="100%">
            <tr>
                <td align="center" height="60">Navigation Menu</td>
            </tr>
        </table>
    </nav>

    <!-- Main Content Area -->
    <main>
        <table border="1" width="100%" height="300">
            <tr>
                <td width="20%" align="center">Content</td>
                <td width="60%" align="center">Main Content</td>
                <td width="20%" align="center">Content</td>
            </tr>
        </table>
    </main>

    <!-- Footer -->
    <footer>
        <table border="1" width="100%">
            <tr>
                <td align="center" height="60">Footer</td>
            </tr>
        </table>
    </footer>

</body>
</html>
